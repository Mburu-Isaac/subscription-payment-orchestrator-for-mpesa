<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>{{"sign Up" if not user else "Password Reset"}}</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/styles.css') }}">
</head>
<body>

  {% with messages = get_flashed_messages(with_categories=true) %}
    {% if messages %}
      <div class="flash-container">
        {% for category, message in messages %}
          <div class="flash-message {{ category }}">{{ message }}</div>
        {% endfor %}
      </div>
    {% endif %}
  {% endwith %}

<div class="form-group">
   <form action="{{ url_for('auth.account_recovery' if user else 'auth.signup', slug=user.slug) }}" method="post">
    <h2>{{"update password" if user else "signUp"}}</h2>
    {% if not user %}
    <label for="contact">mpesa number:</label>
    <input type="text" id="contact" placeholder="mpesa number" name="mpesa_number" required>
    <label for="username">username:</label>
    <input type="text" id="username" placeholder="username" name="username" required>
    <label for="email">email:</label>
    <input type="email" id="email" placeholder="email" name="email" required>
    {% endif %}
    <label for="password">{{"create new password" if user else "create password"}}:</label>
    <input type="password" id="password" placeholder="{{ 'new password' if user else 'create password'}}" name="password" required>
    {% if user %}
    <label for="confirm-password">confirm password:</label>
    <input type="password" id="confirm-password" placeholder="confirm password" name="update_password" required>
    {% endif %}
    <button type="submit">
        {{"update password" if user else "sign Up"}}
    </button>
  </form>
</div>
</body>
</html>
